services:
  web:
    image: nginx:1.27-alpine
    container_name: jiazi-daily-web
    ports:
      - '80:80'
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: node:20-alpine
    container_name: jiazi-daily-api
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install --frozen-lockfile=false && pnpm db:init && pnpm start"
    environment:
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: http://localhost
      DATABASE_URL: postgres://jiazi:jiazi@postgres:5432/jiazi_daily_ai
      REDIS_URL: redis://redis:6379
    volumes:
      - ./server:/app
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: jiazi-daily-postgres
    environment:
      POSTGRES_DB: jiazi_daily_ai
      POSTGRES_USER: jiazi
      POSTGRES_PASSWORD: jiazi
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jiazi-daily-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
